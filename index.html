<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffee Master v10.6</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding-bottom: 120px; zoom: 1.15; overflow-x: hidden; }
        .card { background: #161616; border-radius: 18px; padding: 14px; margin-bottom: 12px; border: 1px solid #262626; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .label-gold { color: #f59e0b; font-size: 9px; font-weight: 900; text-transform: uppercase; margin-top: 20px; margin-bottom: 4px; margin-left: 6px; letter-spacing: 1px; display: block; }
        .label-gold:first-child { margin-top: 0; }
        input, select, textarea { background: #222; border: 2px solid #333; color: #fff; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 4px; font-size: 16px; font-weight: 900; font-style: italic; -webkit-appearance: none; }
        input:focus { border-color: #f59e0b; outline: none; }
        .btn-gold { background: #f59e0b; color: #000; font-weight: 900; padding: 18px; border-radius: 18px; width: 100%; text-transform: uppercase; font-size: 14px; margin-top: 15px; cursor: pointer; }
        .tab-btn { background: #111; color: #444; flex: 1; padding: 14px 5px; border-radius: 14px; font-size: 10px; font-weight: 900; margin: 3px; border: 1px solid #222; }
        .active-tab { background: #f59e0b; color: #000; border-color: #fbbf24; }
        .step-box { background: #161616; padding: 12px; border-radius: 16px; text-align: center; border: 2px solid #262626; width: 145px; flex-shrink: 0; }
        #auth-screen, #modal-feedback, #pix-modal, #modal-detalhes, #admin-user-details, #admin-log-details { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 2000; padding: 20px; display: flex; flex-direction: column; justify-content: center; overflow-y: auto; }
        .hidden { display: none !important; }
        .star { font-size: 35px; cursor: pointer; color: #333; padding: 5px; }
        .star.active { color: #f59e0b; }
        .grain-thumb { width: 65px; height: 65px; border-radius: 14px; object-fit: cover; background: #222; border: 1px solid #333; }
    </style>
</head>
<body class="p-3 max-w-lg mx-auto">
    <div id="auth-screen">
        <div class="card w-full max-w-sm mx-auto border-amber-600 text-center">
            <h1 class="text-3xl font-black text-amber-500 italic uppercase mb-8">COFFEE MASTER</h1>
            <div id="login-form">
                <span class="label-gold text-left">E-mail</span><input type="email" id="login-email">
                <span class="label-gold text-left">Senha</span><input type="password" id="login-pass">
                <button class="btn-gold w-full mt-6" onclick="handleLogin()">Entrar</button>
                <p class="text-[10px] text-center mt-6 font-black uppercase text-zinc-500">Novo? <button class="text-amber-500 underline" onclick="toggleAuth(false)">Criar agora</button></p>
            </div>
            <div id="signup-form" class="hidden text-left">
                <span class="label-gold">Nickname</span><input type="text" id="sign-nick">
                <span class="label-gold">E-mail</span><input type="email" id="sign-email">
                <span class="label-gold">Senha</span><input type="password" id="sign-pass">
                <button class="btn-gold w-full mt-6" onclick="handleSignup()">Criar Conta</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="flex justify-between items-center mb-5 sticky top-0 bg-black z-50 py-2">
            <div><h1 class="text-2xl font-black text-amber-500 italic uppercase leading-none">COFFEE MASTER</h1><span id="user-display" class="text-[8px] font-black text-zinc-600 uppercase italic"></span></div>
            <button onclick="auth.signOut()" class="bg-zinc-900 text-[9px] font-black p-2 rounded-lg border border-zinc-700 text-zinc-500">Sair</button>
        </div>
        
        <div id="tabs-container" class="flex mb-6 bg-black p-1 rounded-2xl sticky top-[55px] z-50 border border-zinc-800 overflow-x-auto no-scrollbar">
            <button class="tab-btn active-tab" onclick="showTab('cafes')">GRÃOS</button>
            <button class="tab-btn" onclick="showTab('receitas')">RECEITAS</button>
            <button class="tab-btn" onclick="showTab('preparo')">PREPARAR</button>
            <button class="tab-btn" onclick="showTab('diario')">DIÁRIO</button>
        </div>

        <div id="tab-cafes">
            <div class="card p-4">
                <span class="label-gold">Grão</span><input type="text" id="g-nome">
                <button class="btn-gold w-full" onclick="saveG()">Salvar Grão</button>
            </div>
            <div id="list-g" class="space-y-3 mt-4"></div>
        </div>

        <div id="tab-receitas" class="hidden">
            <div class="card p-4">
                <span class="label-gold mt-0">Nome</span><input type="text" id="r-nome">
                <div class="grid grid-cols-3 gap-2 mt-4">
                    <div><span class="label-gold mt-0">Ratio</span><input type="number" id="r-ratio-base" step="0.1" oninput="calcR()"></div>
                    <div><span class="label-gold mt-0">Pó (g)</span><input type="number" id="r-po-base" oninput="calcR()"></div>
                    <div><span class="label-gold mt-0">Total</span><input type="number" id="r-total-base" readonly class="text-amber-500 font-bold bg-transparent border-none"></div>
                </div>
                <button class="btn-gold w-full mt-5" onclick="saveR()">Salvar Receita</button>
            </div>
            <div id="list-r" class="space-y-3 mt-4"></div>
        </div>

        <div id="tab-preparo" class="hidden">
            <div class="card border-amber-600 bg-black p-5">
                <select id="p-g" onchange="upCalc()"></select><select id="p-r" onchange="upCalc()"></select>
                <div class="grid grid-cols-4 gap-1 mt-4 text-center">
                    <div><span class="label-gold mt-0">Pó</span><input type="text" id="p-po-val" oninput="upCalc()" class="text-center bg-transparent border-none"></div>
                    <div><span class="label-gold mt-0">Ratio</span><input type="text" id="p-ratio-val" oninput="upCalc()" class="text-center bg-transparent border-none"></div>
                </div>
                <div class="bg-zinc-900 rounded-2xl py-4 px-5 mt-6 text-center">
                    <span class="text-[10px] font-black text-zinc-500 uppercase italic">Água</span>
                    <div class="text-4xl font-black text-white italic"><span id="p-total">0</span>ml</div>
                </div>
                <div id="timer" class="text-6xl font-black my-6 text-center italic">00:00</div>
                <button onclick="toggleTimer()" id="btn-timer-main" class="bg-green-700 text-white font-black py-4 rounded-xl w-full">Iniciar</button>
            </div>
        </div>
        
        <div id="tab-diario" class="hidden"><div id="list-logs" class="space-y-3"></div></div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyCbIsrGjuu6KN-A0xpZUC6ID9aOHBEIJSE", authDomain: "coffee-master-e1f5c.firebaseapp.com", projectId: "coffee-master-e1f5c", storageBucket: "coffee-master-e1f5c.firebasestorage.app", messagingSenderId: "171441357303", appId: "1:171441357303:web:c85dc841ee73f6f29e2ef2" };
        firebase.initializeApp(config); const db = firebase.firestore(), auth = firebase.auth();
        let currentUser = null, localData = { g: [], r: [] }, timer = null, seg = 0;

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user; document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                showTab('cafes');
            } else { document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }
        });

        // --- FUNÇÃO DE CÁLCULO CORRIGIDA ---
        function calcR() {
            const ratio = parseFloat(document.getElementById('r-ratio-base').value) || 0;
            const po = parseFloat(document.getElementById('r-po-base').value) || 0;
            const totalField = document.getElementById('r-total-base');
            if(totalField) {
                totalField.value = Math.round(ratio * po);
                console.log("Cálculo realizado:", ratio * po);
            }
        }

        function upCalc() {
            const r = parseFloat(document.getElementById('p-ratio-val').value) || 0;
            const p = parseFloat(document.getElementById('p-po-val').value) || 0;
            document.getElementById('p-total').innerText = Math.round(r * p);
        }

        function showTab(t){ 
            ['cafes','receitas','preparo','diario'].forEach(i=>{ const el = document.getElementById('tab-'+i); if(el) el.classList.toggle('hidden', i!==t); });
            if(t==='cafes') loadG(); if(t==='receitas') loadR(); if(t==='preparo') loadPrep();
        }

        async function loadG() { const snap = await db.collection('cafes').get(); localData.g = snap.docs.map(d => ({id: d.id, ...d.data()})); document.getElementById('list-g').innerHTML = localData.g.map(i => `<div class="card">${i.nome}</div>`).join(''); }
        async function loadR() { const snap = await db.collection('receitas').get(); localData.r = snap.docs.map(d => ({id: d.id, ...d.data()})); document.getElementById('list-r').innerHTML = localData.r.map(i => `<div class="card">${i.nome}</div>`).join(''); }
        async function loadPrep() { 
            const gc = await db.collection('cafes').get(), rc = await db.collection('receitas').get();
            document.getElementById('p-g').innerHTML = gc.docs.map(d => `<option value="${d.id}">${d.data().nome}</option>`).join('');
            document.getElementById('p-r').innerHTML = rc.docs.map(d => `<option value="${d.id}">${d.data().nome}</option>`).join('');
        }

        function handleLogin() { auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value); }
        function toggleAuth(l) { document.getElementById('login-form').classList.toggle('hidden', !l); document.getElementById('signup-form').classList.toggle('hidden', l); }
        function toggleTimer() { if(timer) { clearInterval(timer); timer = null; } else { timer = setInterval(() => { seg++; document.getElementById('timer').innerText = `${Math.floor(seg/60).toString().padStart(2,'0')}:${(seg%60).toString().padStart(2,'0')}`; }, 1000); } }
    </script>
</body>
</html>
