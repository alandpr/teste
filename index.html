<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffee Master v10.5</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding-bottom: 120px; overflow-x: hidden; }
        .card { background: #161616; border-radius: 18px; padding: 14px; margin-bottom: 12px; border: 1px solid #262626; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .label-gold { color: #f59e0b; font-size: 9px; font-weight: 900; text-transform: uppercase; margin-top: 20px; margin-bottom: 4px; display: block; }
        input, select, textarea { background: #222; border: 2px solid #333; color: #fff; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 4px; font-size: 16px; }
        .btn-gold { background: #f59e0b; color: #000; font-weight: 900; padding: 18px; border-radius: 18px; width: 100%; text-transform: uppercase; margin-top: 15px; }
        .tab-btn { background: #111; color: #444; flex: 1; padding: 14px 5px; border-radius: 14px; font-size: 10px; font-weight: 900; border: 1px solid #222; }
        .active-tab { background: #f59e0b; color: #000; }
        #auth-screen, #modal-feedback, #pix-modal, #modal-detalhes, #admin-user-details, #admin-log-details { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 2000; padding: 20px; display: flex; flex-direction: column; justify-content: center; overflow-y: auto; }
        .hidden { display: none !important; }
        .star { font-size: 35px; cursor: pointer; color: #333; }
        .star.active { color: #f59e0b; }
        .admin-tag { font-size: 7px; color: #f59e0b; padding: 2px 4px; border: 0.5px solid #f59e0b; border-radius: 4px; margin-left: 4px; }
    </style>
</head>
<body class="p-3 max-w-lg mx-auto">
    <!-- ESTRUTURA v10.5 (REDUZIDA PARA NÃO TRAVAR) -->
    <div id="auth-screen">
        <div class="card w-full max-w-sm mx-auto text-center">
            <h1 class="text-3xl font-black text-amber-500 italic uppercase mb-8">COFFEE MASTER</h1>
            <div id="login-form">
                <span class="label-gold text-left">E-mail</span><input type="email" id="login-email">
                <span class="label-gold text-left">Senha</span><input type="password" id="login-pass">
                <button class="btn-gold w-full mt-6" onclick="handleLogin()">Entrar</button>
            </div>
        </div>
    </div>
    <div id="main-app" class="hidden">
        <div class="flex justify-between items-center mb-5 py-2">
            <h1 class="text-2xl font-black text-amber-500 italic uppercase">COFFEE MASTER</h1>
            <button onclick="auth.signOut()" class="bg-zinc-900 text-[9px] p-2 rounded-lg text-zinc-500">Sair</button>
        </div>
        <div id="tabs-container" class="flex mb-6 bg-black p-1 rounded-2xl border border-zinc-800">
            <button class="tab-btn active-tab" onclick="showTab('cafes')">GRÃOS</button>
            <button class="tab-btn" onclick="showTab('preparo')">PREPARAR</button>
            <button id="btn-admin" class="tab-btn hidden" onclick="showTab('admin')">ADMIN</button>
        </div>
        <div id="tab-cafes"></div>
        <div id="tab-preparo" class="hidden"></div>
        <div id="tab-admin" class="hidden"></div>
    </div>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
        const config = { apiKey: "AIzaSyCbIsrGjuu6KN-A0xpZUC6ID9aOHBEIJSE", authDomain: "coffee-master-e1f5c.firebaseapp.com", projectId: "coffee-master-e1f5c", storageBucket: "coffee-master-e1f5c.firebasestorage.app", messagingSenderId: "171441357303", appId: "1:171441357303:web:c85dc841ee73f6f29e2ef2" };
        firebase.initializeApp(config); const db = firebase.firestore(), auth = firebase.auth();
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                if(user.email === 'alanpocos@gmail.com') document.getElementById('btn-admin').classList.remove('hidden');
            } else { document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }
        });
        function handleLogin() { auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value); }
    </script>
</body>
</html>
