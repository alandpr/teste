<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffee Master v10.14</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding-bottom: 120px; zoom: 1.15; overflow-x: hidden; }
        .card { background: #161616; border-radius: 18px; padding: 14px; margin-bottom: 12px; border: 1px solid #262626; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .label-gold { color: #f59e0b; font-size: 9px; font-weight: 900; text-transform: uppercase; margin-top: 20px; margin-bottom: 4px; margin-left: 6px; letter-spacing: 1px; display: block; }
        input, select, textarea { background: #222; border: 2px solid #333; color: #fff; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 4px; font-size: 16px; font-weight: 900; font-style: italic; -webkit-appearance: none; }
        .btn-gold { background: #f59e0b; color: #000; font-weight: 900; padding: 18px; border-radius: 18px; width: 100%; text-transform: uppercase; font-size: 14px; margin-top: 15px; cursor: pointer; }
        .tab-btn { background: #111; color: #444; flex: 1; padding: 14px 5px; border-radius: 14px; font-size: 10px; font-weight: 900; margin: 3px; border: 1px solid #222; }
        .active-tab { background: #f59e0b; color: #000; border-color: #fbbf24; }
        .grain-thumb { width: 65px; height: 65px; border-radius: 14px; object-fit: cover; background: #222; border: 1px solid #333; flex-shrink: 0; }
        #modal-detalhes, #modal-zoom, #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 2000; padding: 20px; display: flex; flex-direction: column; justify-content: center; overflow-y: auto; }
        #modal-zoom { background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-3 max-w-lg mx-auto">

    <div id="modal-zoom" class="hidden" onclick="this.classList.add('hidden')">
        <img id="img-ampliada" class="max-w-[95%] max-h-[80%] rounded-2xl border-2 border-amber-500 shadow-2xl">
    </div>

    <div id="modal-detalhes" class="hidden" onclick="fecharDetalhes()">
        <div class="card w-full max-w-sm mx-auto border-amber-500" onclick="event.stopPropagation()">
            <h3 class="text-amber-500 font-black italic uppercase text-xl mb-4 text-center">Ficha Técnica</h3>
            <div id="detalhes-content" class="space-y-4"></div>
            <button class="btn-gold w-full mt-8" onclick="fecharDetalhes()">VOLTAR</button>
        </div>
    </div>

    <div id="auth-screen">
        <div class="card w-full max-w-sm mx-auto text-center">
            <h1 class="text-3xl font-black text-amber-500 italic uppercase mb-8">COFFEE MASTER</h1>
            <div id="login-form">
                <input type="email" id="login-email" placeholder="E-MAIL">
                <input type="password" id="login-pass" placeholder="SENHA">
                <button class="btn-gold w-full mt-6" onclick="handleLogin()">Entrar</button>
                <p class="text-[10px] mt-6 uppercase text-zinc-500">Novo? <button class="text-amber-500" onclick="toggleAuth(false)">Criar agora</button></p>
            </div>
            <div id="signup-form" class="hidden">
                <input type="text" id="sign-nick" placeholder="NICKNAME">
                <input type="email" id="sign-email" placeholder="E-MAIL">
                <input type="password" id="sign-pass" placeholder="SENHA">
                <select id="sign-type"><option value="pessoal">PERFIL PESSOAL (PRIVADO)</option><option value="comunidade" selected>PERFIL COMUNIDADE (PÚBLICO)</option></select>
                <button class="btn-gold w-full mt-6" onclick="handleSignup()">Criar Conta</button>
                <button class="text-[10px] mt-6 uppercase text-zinc-500" onclick="toggleAuth(true)">Já tenho conta</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="flex justify-between items-center mb-5 sticky top-0 bg-black z-50 py-2">
            <div><h1 class="text-2xl font-black text-amber-500 italic uppercase">COFFEE MASTER</h1><span id="user-display" class="text-[8px] font-black text-zinc-600 uppercase"></span></div>
            <button onclick="auth.signOut()" class="bg-zinc-900 text-[9px] font-black p-2 rounded-lg border border-zinc-700 text-zinc-500">Sair</button>
        </div>
        
        <div id="tabs-container" class="flex mb-6 bg-black p-1 rounded-2xl sticky top-[55px] z-50 border border-zinc-800">
            <button id="btn-cafes" class="tab-btn active-tab" onclick="showTab('cafes')">GRÃOS</button>
            <button id="btn-receitas" class="tab-btn" onclick="showTab('receitas')">RECEITAS</button>
        </div>

        <div id="tab-cafes">
            <div class="card p-4">
                <span class="label-gold mt-0">Produtor</span><input type="text" id="g-prod">
                <span class="label-gold">Grão</span><input type="text" id="g-nome">
                <span class="label-gold">Variedade</span><input type="text" id="g-variedade">
                <span class="label-gold">Foto</span><input type="file" id="g-photo-input" accept="image/*" class="text-[10px] bg-transparent border-dashed border-zinc-700 p-2">
                <div id="g-edit-actions" class="hidden flex gap-2 mt-4"><button class="btn-gold flex-1 mt-0" onclick="saveG()">Atualizar</button><button class="bg-zinc-800 text-zinc-400 font-black py-4 px-4 rounded-xl" onclick="cancelEdit()">X</button></div>
                <button class="btn-gold w-full" onclick="saveG()" id="g-btn-main">Salvar Grão</button>
            </div>
            <div id="list-g" class="space-y-3"></div>
        </div>

        <div id="tab-receitas" class="hidden text-center p-10 text-zinc-600 font-black italic uppercase">Em breve...</div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyCbIsrGjuu6KN-A0xpZUC6ID9aOHBEIJSE", authDomain: "coffee-master-e1f5c.firebaseapp.com", projectId: "coffee-master-e1f5c", storageBucket: "coffee-master-e1f5c.firebasestorage.app", messagingSenderId: "171441357303", appId: "1:171441357303:web:c85dc841ee73f6f29e2ef2" };
        firebase.initializeApp(config); const db = firebase.firestore(); const auth = firebase.auth();
        let currentUser = null, userProfile = null, localData = { g: [] }, editId = null;
        const ADMIN_EMAIL = 'alanpocos@gmail.com';

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user; const p = await db.collection('users').doc(user.uid).get();
                userProfile = p.data() || { nick: 'Visitante', type: 'comunidade' };
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = `@${userProfile.nick} (${userProfile.type})`;
                showTab('cafes');
            } else { document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }
        });

        function showTab(t){ 
            ['cafes','receitas'].forEach(i=>{ document.getElementById('tab-'+i).classList.toggle('hidden', i!==t); document.getElementById('btn-'+i).classList.toggle('active-tab', i===t); }); 
            if(t==='cafes') loadG();
        }

        async function loadG() { 
            let results = [];
            if (currentUser.email === ADMIN_EMAIL) {
                const snap = await db.collection('cafes').get();
                results = snap.docs.map(d => ({id: d.id, ...d.data()}));
            } else if (userProfile.type === 'pessoal') {
                // Perfil PESSOAL: Busca APENAS os grãos do dono
                const snapOwn = await db.collection('cafes').where('owner_uid', '==', currentUser.uid).get();
                results = snapOwn.docs.map(d => ({id: d.id, ...d.data()}));
            } else {
                // Perfil COMUNIDADE: Busca Públicos + Próprios
                const snapPub = await db.collection('cafes').where('visibilidade', '==', 'publico').get();
                const snapOwn = await db.collection('cafes').where('owner_uid', '==', currentUser.uid).get();
                const map = new Map();
                snapPub.forEach(d => map.set(d.id, {id: d.id, ...d.data()}));
                snapOwn.forEach(d => map.set(d.id, {id: d.id, ...d.data()}));
                results = Array.from(map.values());
            }
            localData.g = results;
            renderG(results);
        }

        function renderG(data) {
            let h = ''; data.forEach(i => {
                const isOwner = i.owner_uid === currentUser.uid;
                const isAdmin = currentUser.email === ADMIN_EMAIL;
                h += `<div class="card p-3 flex gap-3 items-center border border-zinc-800"><div class="flex-1 min-w-0 cursor-pointer" onclick="abrirDetalhesG('${i.id}')"><div class="text-[8px] text-zinc-600 font-black uppercase truncate">${i.prod || '--'} • @${i.owner_nick || 'Mestre'}</div><div class="text-base font-black italic uppercase text-white truncate">${i.nome}</div></div><img src="${i.photo || 'https://via.placeholder.com/150'}" class="grain-thumb">${isOwner || isAdmin ? `<button onclick="editG('${i.id}')" class="p-2 bg-zinc-900 rounded-lg text-xs">✏️</button>` : ''}</div>`;
            }); document.getElementById('list-g').innerHTML = h;
        }

        function editG(id) {
            const i = localData.g.find(x => x.id === id);
            if(!i) return;
            editId = id;
            document.getElementById('g-prod').value = i.prod;
            document.getElementById('g-nome').value = i.nome;
            document.getElementById('g-variedade').value = i.variedade;
            document.getElementById('g-edit-actions').classList.remove('hidden');
            document.getElementById('g-btn-main').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editId = null;
            document.getElementById('g-edit-actions').classList.add('hidden');
            document.getElementById('g-btn-main').classList.remove('hidden');
            document.querySelectorAll('#tab-cafes input').forEach(el => el.value = "");
        }

        async function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const size = 600;
                        canvas.width = size; canvas.height = size;
                        const min = Math.min(img.width, img.height);
                        canvas.getContext('2d').drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, size, size);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function saveG() {
            const file = document.getElementById('g-photo-input').files[0];
            const originalItem = editId ? localData.g.find(x => x.id === editId) : null;
            
            const d = { 
                prod: document.getElementById('g-prod').value.toUpperCase(), 
                nome: document.getElementById('g-nome').value.toUpperCase(), 
                variedade: document.getElementById('g-variedade').value.toUpperCase(),
                owner_uid: originalItem ? (originalItem.owner_uid || currentUser.uid) : currentUser.uid, 
                owner_nick: originalItem ? (originalItem.owner_nick || userProfile.nick) : userProfile.nick,
                visibilidade: originalItem ? (originalItem.visibilidade || (userProfile.type === 'pessoal' ? 'privado' : 'publico')) : (userProfile.type === 'pessoal' ? 'privado' : 'publico'),
                ts: firebase.firestore.FieldValue.serverTimestamp()
            };

            if(file) d.photo = await processImage(file);
            if(editId) await db.collection('cafes').doc(editId).update(d);
            else await db.collection('cafes').add(d);
            
            cancelEdit(); loadG();
        }

        function abrirDetalhesG(id) { 
            const i = localData.g.find(x => x.id === id); 
            if(!i) return; 
            document.getElementById('detalhes-content').innerHTML = `
                <div class="flex justify-center mb-4"><img src="${i.photo || 'https://via.placeholder.com/150'}" class="w-40 h-40 rounded-2xl object-cover cursor-zoom-in" onclick="ampliarImagem('${i.photo || 'https://via.placeholder.com/150'}')"></div>
                <div><span class="label-gold">PRODUTOR</span><p class="text-white font-bold italic text-sm">${i.prod||'--'}</p></div>
                <div><span class="label-gold">GRÃO</span><p class="text-white font-bold italic text-sm">${i.nome||'--'}</p></div>
                <div class="text-[8px] text-zinc-600 mt-4 uppercase">@${i.owner_nick} | ${i.visibilidade}</div>
            `; 
            document.getElementById('modal-detalhes').classList.remove('hidden'); 
        }

        function ampliarImagem(src) { document.getElementById('img-ampliada').src = src; document.getElementById('modal-zoom').classList.remove('hidden'); }
        function fecharDetalhes() { document.getElementById('modal-detalhes').classList.add('hidden'); }
        async function handleLogin() { try { await auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value); } catch(e) { alert(e.message); } }
        async function handleSignup() { try { const res = await auth.createUserWithEmailAndPassword(document.getElementById('sign-email').value, document.getElementById('sign-pass').value); await db.collection('users').doc(res.user.uid).set({ nick: document.getElementById('sign-nick').value, type: document.getElementById('sign-type').value, email: document.getElementById('sign-email').value, uid: res.user.uid }); } catch(e) { alert(e.message); } }
        function toggleAuth(l) { document.getElementById('login-form').classList.toggle('hidden', !l); document.getElementById('signup-form').classList.toggle('hidden', l); }
    </script>
</body>
</html>
