<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffee Master v10.17</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding-bottom: 120px; zoom: 1.15; overflow-x: hidden; }
        .card { background: #161616; border-radius: 18px; padding: 14px; margin-bottom: 12px; border: 1px solid #262626; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .label-gold { color: #f59e0b; font-size: 9px; font-weight: 900; text-transform: uppercase; margin-top: 20px; margin-bottom: 4px; margin-left: 6px; letter-spacing: 1px; display: block; }
        .label-gold:first-child { margin-top: 0; }
        input, select, textarea { background: #222; border: 2px solid #333; color: #fff; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 4px; font-size: 16px; font-weight: 900; font-style: italic; -webkit-appearance: none; }
        input:focus { border-color: #f59e0b; outline: none; }
        .btn-gold { background: #f59e0b; color: #000; font-weight: 900; padding: 18px; border-radius: 18px; width: 100%; text-transform: uppercase; font-size: 14px; margin-top: 15px; cursor: pointer; }
        .tab-btn { background: #111; color: #444; flex: 1; padding: 14px 5px; border-radius: 14px; font-size: 10px; font-weight: 900; margin: 3px; border: 1px solid #222; }
        .active-tab { background: #f59e0b; color: #000; border-color: #fbbf24; }
        #auth-screen, #modal-feedback, #pix-modal, #modal-detalhes, #modal-zoom, #admin-user-details { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 2000; padding: 20px; display: flex; flex-direction: column; justify-content: center; overflow-y: auto; }
        #modal-zoom { background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 0; }
        .hidden { display: none !important; }
        .search-input { background: #000; border: 1px solid #333; font-size: 11px; padding: 10px; border-radius: 10px; text-transform: uppercase; margin-bottom: 15px; }
        .grain-thumb { width: 75px; height: 75px; border-radius: 16px; object-fit: cover; background: #222; border: 1px solid #333; flex-shrink: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-3 max-w-lg mx-auto">
    <!-- MODAIS -->
    <div id="modal-zoom" class="hidden" onclick="this.classList.add('hidden')"><img id="img-ampliada" class="max-w-[95%] max-h-[80%] rounded-2xl border-2 border-amber-500 shadow-2xl"></div>
    <div id="modal-detalhes" class="hidden" onclick="fecharDetalhes()"><div class="card w-full max-w-sm mx-auto border-amber-500 shadow-[0_0_50px_rgba(245,158,11,0.1)]" onclick="event.stopPropagation()"><h3 class="text-amber-500 font-black italic uppercase text-xl mb-4 text-center">Ficha Técnica</h3><div id="detalhes-content" class="space-y-4"></div><button class="btn-gold w-full mt-8" onclick="fecharDetalhes()">VOLTAR</button></div></div>
    <div id="pix-modal" class="hidden" onclick="closePix()"><div class="card w-full max-w-sm mx-auto text-center" onclick="event.stopPropagation()"><h2 class="text-amber-500 font-black italic uppercase mb-4">Apoie o Coffee Master</h2><div id="pix-qrcode" class="flex justify-center mb-4 bg-white p-2 rounded-lg"></div><button class="btn-gold w-full" onclick="copyPix()">Copiar Chave Pix</button><button class="text-zinc-500 text-[10px] mt-4 uppercase font-bold" onclick="closePix()">Fechar</button></div></div>

    <!-- AUTH -->
    <div id="auth-screen">
        <div class="card w-full max-w-sm mx-auto text-center">
            <h1 class="text-3xl font-black text-amber-500 italic uppercase mb-8">COFFEE MASTER</h1>
            <div id="login-form">
                <input type="email" id="login-email" placeholder="E-MAIL"><input type="password" id="login-pass" placeholder="SENHA">
                <button class="btn-gold w-full mt-6" onclick="handleLogin()">Entrar</button>
                <p class="text-[10px] text-center mt-6 font-black uppercase text-zinc-500">Novo? <button class="text-amber-500 underline" onclick="toggleAuth(false)">Criar agora</button></p>
            </div>
            <div id="signup-form" class="hidden text-left">
                <span class="label-gold">Nickname</span><input type="text" id="sign-nick">
                <span class="label-gold">E-mail</span><input type="email" id="sign-email">
                <span class="label-gold">Senha</span><input type="password" id="sign-pass">
                <span class="label-gold">Perfil</span><select id="sign-type"><option value="pessoal">PESSOAL (PRIVADO)</option><option value="comunidade" selected>COMUNIDADE (PÚBLICO)</option></select>
                <button class="btn-gold w-full mt-6" onclick="handleSignup()">Criar Conta</button>
                <button class="text-[10px] w-full text-center mt-6 font-black uppercase text-zinc-500 underline" onclick="toggleAuth(true)">Já tenho conta</button>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-app" class="hidden">
        <div class="flex justify-between items-center mb-5 sticky top-0 bg-black z-50 py-2">
            <div><h1 class="text-2xl font-black text-amber-500 italic uppercase leading-none">COFFEE MASTER</h1><span id="user-display" class="text-[8px] font-black text-zinc-600 uppercase"></span></div>
            <div class="flex gap-2"><button onclick="openPix()" class="bg-zinc-900 text-[9px] font-black p-2 rounded-lg border border-amber-600 text-amber-500 italic uppercase">Pagar um café ☕</button><button onclick="auth.signOut()" class="bg-zinc-900 text-[9px] font-black p-2 rounded-lg border border-zinc-700 text-zinc-500">Sair</button></div>
        </div>
        
        <div id="tabs-container" class="flex mb-6 bg-black p-1 rounded-2xl sticky top-[55px] z-50 border border-zinc-800 shadow-2xl overflow-x-auto no-scrollbar">
            <button id="btn-cafes" class="tab-btn active-tab" onclick="showTab('cafes')">GRÃOS</button>
            <button id="btn-receitas" class="tab-btn" onclick="showTab('receitas')">RECEITAS</button>
            <button id="btn-preparo" class="tab-btn" onclick="showTab('preparo')">PREPARAR</button>
            <button id="btn-diario" class="tab-btn" onclick="showTab('diario')">DIÁRIO</button>
            <button id="btn-admin" class="tab-btn hidden" onclick="showTab('admin')">ADMIN</button>
        </div>

        <div id="tab-cafes">
            <div class="card p-4">
                <span class="label-gold mt-0">Produtor</span><input type="text" id="g-prod">
                <span class="label-gold">Grão</span><input type="text" id="g-nome">
                <span class="label-gold">Variedade</span><input type="text" id="g-variedade">
                <span class="label-gold">Processo</span><input type="text" id="g-processo">
                <div class="flex gap-2">
                    <div class="flex-1"><span class="label-gold">Altitude</span><input type="text" id="g-altitude"></div>
                    <div class="flex-1"><span class="label-gold">Torrefação</span><input type="text" id="g-torrefacao"></div>
                </div>
                <div class="flex gap-2">
                    <div class="flex-1"><span class="label-gold">Torra</span><select id="g-torra"><option value="" disabled selected>SELECIONAR</option><option>CLARA</option><option>MÉDIA-CLARA</option><option>MÉDIA</option><option>ESCURA</option></select></div>
                    <div class="flex-1"><span class="label-gold">DATA DA TORRA</span><input type="date" id="g-data"></div>
                </div>
                <span class="label-gold">Notas Sensoriais</span><textarea id="g-notas" rows="2"></textarea>
                <span class="label-gold">Foto</span><input type="file" id="g-photo-input" accept="image/*" class="text-[10px] bg-transparent border-dashed border-zinc-700 p-2">
                <div id="g-edit-actions" class="hidden flex gap-2 mt-4"><button class="btn-gold flex-1 mt-0" onclick="saveG()">Atualizar</button><button class="bg-zinc-800 text-zinc-400 font-black py-4 px-4 rounded-xl flex-[0.3]" onclick="cancelEdit('g')">X</button></div>
                <button class="btn-gold w-full mt-4" onclick="saveG()" id="g-btn-main">Salvar Grão</button>
            </div>
            <input type="text" id="search-g" class="search-input w-full" placeholder="FILTRAR GRÃOS...">
            <div id="list-g" class="space-y-3"></div>
        </div>

        <div id="tab-receitas" class="hidden">
            <input type="text" id="search-r" class="search-input w-full" placeholder="FILTRAR RECEITAS...">
            <div id="list-r" class="space-y-3"></div>
        </div>

        <div id="tab-preparo" class="hidden text-center p-10 text-zinc-600 font-black italic uppercase leading-tight">Em desenvolvimento...<br>Timer de extração vindo aí!</div>
        <div id="tab-diario" class="hidden text-center p-10 text-zinc-600 font-black italic uppercase leading-tight">Seu diário de bordo<br>em breve aqui.</div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyCbIsrGjuu6KN-A0xpZUC6ID9aOHBEIJSE", authDomain: "coffee-master-e1f5c.firebaseapp.com", projectId: "coffee-master-e1f5c", storageBucket: "coffee-master-e1f5c.firebasestorage.app", messagingSenderId: "171441357303", appId: "1:171441357303:web:c85dc841ee73f6f29e2ef2" };
        firebase.initializeApp(config); const db = firebase.firestore(); const auth = firebase.auth();
        let currentUser = null, userProfile = null, localData = { g: [], r: [] }, editIds = { g: null, r: null };
        const DEFAULT_IMG = "https://images.unsplash.com/photo-1559056199-641a0ac8b55e?w=150&h=150&fit=crop&q=80";
        const ADMIN_EMAIL = 'alanpocos@gmail.com';

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user; const p = await db.collection('users').doc(user.uid).get();
                userProfile = p.data() || { nick: 'Visitante', type: 'comunidade' };
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = `@${userProfile.nick} (${userProfile.type})`;
                if(user.email === ADMIN_EMAIL) document.getElementById('btn-admin').classList.remove('hidden');
                showTab('cafes');
            } else { document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }
        });

        function showTab(t){ 
            ['cafes','receitas','preparo','diario','admin'].forEach(i=>{ const el = document.getElementById('tab-'+i); if(el) el.classList.toggle('hidden', i!==t); const btn = document.getElementById('btn-'+i); if(btn) btn.classList.toggle('active-tab', i===t); }); 
            if(t==='cafes') loadG(); if(t==='receitas') loadR();
        }

        async function loadG() { 
            let results = [];
            if (currentUser.email === ADMIN_EMAIL) {
                const snap = await db.collection('cafes').get();
                results = snap.docs.map(d => ({id: d.id, ...d.data()}));
            } else if (userProfile.type === 'pessoal') {
                const snapOwn = await db.collection('cafes').where('owner_uid', '==', currentUser.uid).get();
                results = snapOwn.docs.map(d => ({id: d.id, ...d.data()}));
            } else {
                const snapPub = await db.collection('cafes').where('visibilidade', '==', 'publico').get();
                const snapOwn = await db.collection('cafes').where('owner_uid', '==', currentUser.uid).get();
                const map = new Map();
                snapPub.forEach(d => map.set(d.id, {id: d.id, ...d.data()}));
                snapOwn.forEach(d => map.set(d.id, {id: d.id, ...d.data()}));
                results = Array.from(map.values());
            }
            localData.g = results; renderG(results);
        }

        function renderG(data) {
            let h = ''; data.forEach(i => {
                const isOwner = i.owner_uid === currentUser.uid || currentUser.email === ADMIN_EMAIL;
                const img = (i.photo && i.photo.length > 100) ? i.photo : DEFAULT_IMG;
                h += `<div class="card p-3 flex gap-3 items-center border border-zinc-800"><div class="flex-1 min-w-0 cursor-pointer" onclick="abrirDetalhesG('${i.id}')"><div class="text-[8px] text-zinc-600 font-black uppercase truncate">${i.prod || '--'} • @${i.owner_nick || 'Mestre'}</div><div class="text-base font-black italic uppercase text-white truncate leading-tight">${i.nome}</div><div class="text-[8px] text-amber-500 font-black uppercase mt-1 truncate">${i.variedade || '--'} | ${i.processo || '--'} | ${i.torrefacao || '--'}</div></div><img src="${img}" class="grain-thumb"><div class="flex flex-col gap-1">${isOwner ? `<button onclick="editG('${i.id}')" class="p-2 bg-zinc-900 rounded-lg text-xs">✏️</button><button onclick="del('cafes','${i.id}','${i.nome}')" class="p-2 bg-zinc-900 rounded-lg text-xs">🗑️</button>` : ''}</div></div>`;
            }); document.getElementById('list-g').innerHTML = h;
        }

        async function loadR() {
            let snap = await db.collection('receitas').get();
            localData.r = snap.docs.map(d => ({id: d.id, ...d.data()})); renderR(localData.r);
        }

        function renderR(data) {
            let h = ''; data.forEach(i => {
                h += `<div class="card p-3 flex justify-between items-center h-[85px]"><div class="flex-1 min-w-0 cursor-pointer"><div class="text-lg font-black italic uppercase text-amber-500 truncate">${i.nome}</div><div class="text-[8px] text-zinc-600 font-black uppercase mt-1">por @${i.owner_nick || 'Mestre'}</div></div><button class="text-xs font-black p-3 bg-amber-600 text-black rounded-lg italic uppercase">Preparar</button></div>`;
            }); document.getElementById('list-r').innerHTML = h;
        }

        async function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const size = 600;
                        canvas.width = size; canvas.height = size;
                        const min = Math.min(img.width, img.height);
                        canvas.getContext('2d').drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, size, size);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function saveG() {
            const file = document.getElementById('g-photo-input').files[0];
            const original = editIds.g ? localData.g.find(x => x.id === editIds.g) : null;
            const d = { 
                prod: document.getElementById('g-prod').value.toUpperCase(), 
                nome: document.getElementById('g-nome').value.toUpperCase(), 
                variedade: document.getElementById('g-variedade').value.toUpperCase(),
                processo: document.getElementById('g-processo').value.toUpperCase(),
                torrefacao: document.getElementById('g-torrefacao').value.toUpperCase(),
                torra: document.getElementById('g-torra').value,
                altitude: document.getElementById('g-altitude').value,
                data: document.getElementById('g-data').value,
                notas: document.getElementById('g-notas').value.toUpperCase(),
                owner_uid: original ? original.owner_uid : currentUser.uid, 
                owner_nick: original ? original.owner_nick : userProfile.nick,
                visibilidade: original ? original.visibilidade : (userProfile.type === 'pessoal' ? 'privado' : 'publico'),
                ts: firebase.firestore.FieldValue.serverTimestamp()
            };
            if(file) d.photo = await processImage(file);
            if(editIds.g) await db.collection('cafes').doc(editIds.g).update(d); else await db.collection('cafes').add(d);
            cancelEdit('g'); loadG();
        }

        function editG(id) { 
            const i = localData.g.find(x => x.id === id); if(!i) return; editIds.g = id;
            document.getElementById('g-prod').value = i.prod; document.getElementById('g-nome').value = i.nome;
            document.getElementById('g-variedade').value = i.variedade; document.getElementById('g-processo').value = i.processo || '';
            document.getElementById('g-torrefacao').value = i.torrefacao || ''; document.getElementById('g-torra').value = i.torra || '';
            document.getElementById('g-altitude').value = i.altitude || ''; document.getElementById('g-data').value = i.data || '';
            document.getElementById('g-notas').value = i.notas || '';
            document.getElementById('g-edit-actions').classList.remove('hidden'); document.getElementById('g-btn-main').classList.add('hidden');
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function cancelEdit(t) { 
            editIds[t] = null; 
            document.getElementById(t+'-edit-actions').classList.add('hidden'); 
            document.getElementById(t+'-btn-main').classList.remove('hidden'); 
            document.querySelectorAll('#tab-cafes input, select, textarea').forEach(el => el.value = "");
        }

        async function del(c, id, n) { if(confirm(`Excluir ${n}?`)) { await db.collection(c).doc(id).delete(); loadG(); } }

        function abrirDetalhesG(id) { 
            const i = localData.g.find(x => x.id === id); if(!i) return; 
            const img = (i.photo && i.photo.length > 100) ? i.photo : DEFAULT_IMG;
            document.getElementById('detalhes-content').innerHTML = `
                <div class="flex justify-center mb-4"><img src="${img}" class="w-44 h-44 rounded-2xl object-cover border-2 border-zinc-800 shadow-2xl cursor-zoom-in" onclick="ampliarImagem('${img}')"></div>
                <div><span class="label-gold">PRODUTOR</span><p class="text-white font-bold italic text-sm">${i.prod||'--'}</p></div>
                <div><span class="label-gold">IDENTIFICAÇÃO</span><p class="text-white font-bold italic text-sm">${i.nome||'--'}</p></div>
                <div><span class="label-gold">TORREFAÇÃO</span><p class="text-amber-500 font-bold italic text-sm">${i.torrefacao||'--'}</p></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><span class="label-gold">VARIEDADE</span><p class="text-white font-bold italic text-sm">${i.variedade||'--'}</p></div>
                    <div><span class="label-gold">PROCESSO</span><p class="text-white font-bold italic text-sm">${i.processo||'--'}</p></div>
                </div>
                <div><span class="label-gold">ALTITUDE | TORRA</span><p class="text-amber-500 font-bold italic text-sm">${i.altitude||'--'} | ${i.torra||'--'}</p></div>
                <div><span class="label-gold">NOTAS</span><p class="text-zinc-400 italic text-sm">"${i.notas||'--'}"</p></div>
            `; 
            document.getElementById('modal-detalhes').classList.remove('hidden'); 
        }

        function ampliarImagem(src) { document.getElementById('img-ampliada').src = src; document.getElementById('modal-zoom').classList.remove('hidden'); }
        function fecharDetalhes() { document.getElementById('modal-detalhes').classList.add('hidden'); }
        function openPix(){ document.getElementById('pix-modal').classList.remove('hidden'); const qr = document.getElementById("pix-qrcode"); qr.innerHTML = ""; new QRCode(qr, {text: "00020101021126480014br.gov.bcb.pix0119alanpocos@gmail.com5204000053039865802BR5930ALAN DOUGLAS PEREIRA RODRIGUES6005POCOS6304", width: 200, height: 200}); }
        function closePix(){ document.getElementById('pix-modal').classList.add('hidden'); }
        function copyPix(){ navigator.clipboard.writeText("alanpocos@gmail.com"); alert('Pix copiado!'); }
        function toggleAuth(l) { document.getElementById('login-form').classList.toggle('hidden', !l); document.getElementById('signup-form').classList.toggle('hidden', l); }
        async function handleLogin() { try { await auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value); } catch(e) { alert(e.message); } }
        async function handleSignup() { try { const res = await auth.createUserWithEmailAndPassword(document.getElementById('sign-email').value, document.getElementById('sign-pass').value); await db.collection('users').doc(res.user.uid).set({ nick: document.getElementById('sign-nick').value, type: document.getElementById('sign-type').value, email: document.getElementById('sign-email').value, uid: res.user.uid }); } catch(e) { alert(e.message); } }
    </script>
</body>
</html>
